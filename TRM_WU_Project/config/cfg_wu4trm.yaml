# ARC LoRA Two-Pass HyperNetwork fine-tuning config

defaults:
  - arch: trm
  - _self_

hydra:
  output_subdir: null

# Data path
data_paths: ['data/arc1concept-aug-1000']
data_paths_test: []
circuit_features_path: null

evaluators:
  - name: arc@ARC

# Hyperparams - Training
global_batch_size: 16   # Smaller batch size for HyperNetwork due to VRAM cost

epochs: 20000            
eval_interval: 2000
checkpoint_every_eval: True

lr: 1e-4                 # PG Tokenizer & Transformer lr
lr_min_ratio: 0.1
lr_warmup_steps: 1000

# PG HyperNetwork Topology
pg_num_blocks: 2         # HyperNetwork 内部 Transformer 的深度
pg_d_model: 256          # HyperNetwork 内部隐特征维度 (256膨胀至1024)
pg_dim_acc: 4            # Tokenizer 的压缩截断比
pg_use_rope: False
head_lora: True
condition_mode: "embedding_only"  # 性能模式："full_trm" (获取完整的长循序推理特征，极慢) 或 "embedding_only" (仅抽取底层特征向量，极速)

# 调试模式优化：默认跳过开局耗时的近30万个样例评估
skip_baseline_eval: True

# LoRA Specific settings
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
unfreeze_embed_tokens: True      # Joint Training: PG and embed_tokens are jointly trained

# Standard hyperparameter settings
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
puzzle_emb_weight_decay: 0.1

# Hyperparams - Puzzle embeddings training
puzzle_emb_lr: 1e-2

seed: 42
min_eval_interval: 0 # when to start the eval

ema: False               
ema_rate: 0.999
freeze_weights: False
